name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: .exe
            archive: zip
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            ext: .exe
            archive: zip
          - target: x86_64-apple-darwin
            os: macos-latest
            ext: ""
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: ""
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare archive
        shell: bash
        run: |
          BINARY="target/${{ matrix.target }}/release/obsidian-mcp${{ matrix.ext }}"
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="obsidian-mcp-$VERSION-${{ matrix.target }}"
          mkdir -p dist

          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "dist/$ARCHIVE.zip" "$BINARY"
          else
            cp "$BINARY" "dist/obsidian-mcp${{ matrix.ext }}"
            cd dist
            tar czf "$ARCHIVE.tar.gz" "obsidian-mcp${{ matrix.ext }}"
            rm "obsidian-mcp${{ matrix.ext }}"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate checksums
        run: |
          find . -type f \( -name "*.zip" -o -name "*.tar.gz" \) -exec sha256sum {} \; > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.zip
            **/*.tar.gz
            checksums.txt
          generate_release_notes: true
